apiVersion: v1
kind: Secret
metadata:
  name: migration-planner-rds
  labels:
    app: postgres
type: Opaque
stringData:
  config.yaml: |
    database:
      hostname: postgres
      name: planner
      password: adminpass
      port: 5432
      type: pgsql
      user: admin
    service:
      address: :3443
      agentEndpointAddress: :7443
      imageEndpointAddress: :11443
      baseAgentEndpointUrl: https://localhost:7443
      baseImageEndpointUrl: https://localhost:11443
      baseUrl: https://localhost:3443
      logLevel: debug
      auth:
        type: local
        localPrivateKey: 
  db.host: "postgres"
  db.name: "planner"
  db.password: "adminpass"
  db.port: "5432"
  db.user: "admin"
